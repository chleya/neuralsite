# NeuralSite V2.0 Docker Compose
# 启动命令: docker-compose up -d

version: '3.8'

services:
  # PostgreSQL + PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: neuralsite-postgres
    environment:
      POSTGRES_DB: neuralsite
      POSTGRES_USER: neuralsite
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralsite"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.11-community
    container_name: neuralsite-neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: neuralsite-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  # 后端API (可选 - 需要构建)
  # backend:
  #   build: ./packages/core
  #   container_name: neuralsite-backend
  #   environment:
  #     DATABASE_URL: postgresql://neuralsite:password@postgres:5432/neuralsite
  #     NEO4J_URI: bolt://neo4j:7687
  #     REDIS_URL: redis://redis:6379/0
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   ports:
  #     - "8000:8000"

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: F:/neuralsite/postgres-data
  neo4j_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: F:/neuralsite/neo4j-data
  neo4j_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: F:/neuralsite/neo4j-logs
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: F:/neuralsite/redis-data
