# =============================================================================
# NeuralSite V2.0 Docker Compose
# 启动命令: docker-compose up -d
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL + PostGIS
  # ---------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:15-3.3
    container_name: neuralsite-postgres
    environment:
      POSTGRES_DB: neuralsite
      POSTGRES_USER: neuralsite
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - neuralsite-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralsite"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Neo4j 图数据库
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.11-community
    container_name: neuralsite-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_default__listen__address: 0.0.0.0
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - neuralsite-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 缓存
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: neuralsite-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - neuralsite-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neuralsite-backend
    environment:
      # Database
      DATABASE_URL: postgresql://neuralsite:${POSTGRES_PASSWORD:-password}@postgres:5432/neuralsite
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      # Redis
      REDIS_URL: redis://redis:6379/0
      # JWT
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      # Python
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      PYTHON_ENV: production
    volumes:
      - ./packages/core:/app/packages/core
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - neuralsite-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: neuralsite-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Static frontend files
      - frontend_static:/usr/share/nginx/html:ro
    ports:
      - "80:80"
      # Uncomment for HTTPS in production
      # - "443:443"
    networks:
      - neuralsite-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  neuralsite-network:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/postgres-data
  neo4j_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/neo4j-data
  neo4j_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/neo4j-logs
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/redis-data
  frontend_static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${FRONTEND_PATH:-./packages/studio/dist}
  uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_PATH:-./data}/uploads
