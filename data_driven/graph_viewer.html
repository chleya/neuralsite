        body { font-family: 'Noto Sans SC', sans-serif; background: #0f172a; color: #e2e8f0; }

        .station-point:hover { transform: scale(1.3); }

            <button onclick="searchStation()" class="px-6 py-2 bg-cyan-600 hover:bg-cyan-700 rounded-lg">查询</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 flex gap-6">
        <!-- 左侧：高程曲线图 -->

            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="text-cyan-400">📊</span> 高程纵断面曲线

            <div class="relative h-80 bg-slate-900 rounded-lg overflow-hidden" id="chart-container">

            </div>
            <div class="mt-2 text-sm text-slate-400 flex justify-between">

        <!-- 右侧：详细信息 -->

                <span class="text-amber-400">📋</span> 桩号详情
            </h2>
            
            <div id="station-info" class="space-y-4">
                <div class="text-center text-slate-400 py-8">
                    点击左侧图表中的点查看详情
                </div>
            </div>
        </div>
    </div>

        ];

        // 添加一些示例照片和问题
        const samplePhotos = {
            4300: ['微信图片_202506020825381.jpg', '微信图片_202506020827451.jpg'],
            4500: ['现场照片_裂缝.jpg'],
            4600: ['施工照片_压实.jpg']
        };

        const sampleIssues = {
            4300: [{type: '裂缝', severity: '轻度', desc: '路面发现轻微裂缝'}],
            4500: [{type: '沉降', severity: '中度', desc: '需要观测'}]
        };

        // 绘制图表
        function drawChart() {
            const svg = document.getElementById('elevation-chart');
            const rect = svg.getBoundingClientRect();
            const width = rect.width || 600;
            const height = rect.height || 300;
            const padding = 40;

            // 找到高程范围
            const elevations = rawData.map(d => d.elev);
            const minElev = Math.floor(Math.min(...elevations));
            const maxElev = Math.ceil(Math.max(...elevations));
            
            // 计算坐标
            const xScale = (i) => padding + (i / (rawData.length - 1)) * (width - 2 * padding);
            const yScale = (elev) => height - padding - ((elev - minElev) / (maxElev - minElev)) * (height - 2 * padding);

            // 清空
            svg.innerHTML = '';

            // 绘制网格线
            for (let e = minElev; e <= maxElev; e += 1) {
                const y = yScale(e);
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', padding);
                line.setAttribute('y1', y);
                line.setAttribute('x2', width - padding);
                line.setAttribute('y2', y);
                line.setAttribute('stroke', '#334155');
                line.setAttribute('stroke-dasharray', '4');
                svg.appendChild(line);

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', padding - 5);
                text.setAttribute('y', y + 4);
                text.setAttribute('fill', '#64748b');
                text.setAttribute('font-size', '10');
                text.setAttribute('text-anchor', 'end');
                text.textContent = e.toFixed(1);
                svg.appendChild(text);
            }

            // 绘制曲线
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            let pathD = '';
            rawData.forEach((d, i) => {
                const x = xScale(i);
                const y = yScale(d.elev);
                pathD += (i === 0 ? 'M' : 'L') + x + ',' + y;
            });
            path.setAttribute('d', pathD);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke', '#06b6d4');
            path.setAttribute('stroke-width', '2');
            svg.appendChild(path);

            // 绘制采样点
            const step = Math.floor(rawData.length / 20); // 每20个点画一个
            rawData.forEach((d, i) => {
                if (i % step !== 0 && i !== rawData.length - 1) return;
                
                const x = xScale(i);
                const y = yScale(d.elev);

                const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                circle.setAttribute('cx', x);
                circle.setAttribute('cy', y);
                circle.setAttribute('r', '6');
                circle.setAttribute('fill', '#06b6d4');
                circle.setAttribute('class', 'station-point');
                circle.setAttribute('data-id', d.id);
                circle.setAttribute('data-name', d.name);
                circle.setAttribute('data-elev', d.elev);
                circle.onclick = () => showStationInfo(d.id, d.name, d.elev);
                svg.appendChild(circle);
            });
        }

        // 显示桩号详情
        function showStationInfo(id, name, elev) {
            const container = document.getElementById('station-info');
            
            const photos = samplePhotos[id] || [];
            const issues = sampleIssues[id] || [];

            let html = `
                <div class="bg-slate-700 rounded-lg p-4">
                    <div class="text-2xl font-bold text-cyan-400 mb-2">${name}</div>
                    <div class="text-lg text-white">高程: <span class="text-amber-400">${elev.toFixed(2)}m</span></div>
                    <div class="text-sm text-slate-400">桩号ID: ${id}</div>
                </div>
            `;

            if (photos.length > 0) {
                html += `
                    <div class="bg-slate-700 rounded-lg p-4">
                        <div class="font-bold text-purple-400 mb-2">📷 照片 (${photos.length})</div>
                        <div class="space-y-1">
                            ${photos.map(p => `<div class="text-sm text-slate-300">${p}</div>`).join('')}
                        </div>
                    </div>
                `;
            }

            if (issues.length > 0) {
                html += `
                    <div class="bg-slate-700 rounded-lg p-4">
                        <div class="font-bold text-red-400 mb-2">❗ 问题 (${issues.length})</div>
                        <div class="space-y-2">
                            ${issues.map(i => `
                                <div class="bg-slate-800 rounded p-2">
                                    <div class="text-sm font-bold">${i.type}</div>
                                    <div class="text-xs text-slate-400">${i.severity} - ${i.desc}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            if (photos.length === 0 && issues.length === 0) {
                html += `
                    <div class="bg-slate-700 rounded-lg p-4 text-center text-slate-400">
                        暂无照片和问题
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // 搜索
        function searchStation() {
            const input = document.getElementById('search-input').value.trim();
            if (!input) return;

            // 解析桩号
            const match = input.match(/^(K|ZK|YK)?(\d+)\+(\d{1,3})$/);
            if (match) {
                const km = parseInt(match[2]);
                const offset = parseInt(match[3]);
                const id = km * 1000 + offset;
                
                // 找到最近的桩号
                const found = rawData.find(d => d.id === id);
                if (found) {
                    showStationInfo(found.id, found.name, found.elev);
                    return;
                }

                // 查找最近的
                let closest = rawData[0];
                let minDist = Math.abs(rawData[0].id - id);
                for (const d of rawData) {
                    const dist = Math.abs(d.id - id);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = d;
                    }
                }
                
                if (minDist <= 50) {
                    showStationInfo(closest.id, closest.name, closest.elev);
                } else {
                    alert('未找到该桩号');
                }
            } else {
                alert('请输入正确的桩号格式，如 K4+500');
            }
        }

        // 回车搜索
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchStation();
        });

        // 更新统计
        document.getElementById('stat-stations').textContent = rawData.length;
        document.getElementById('stat-segments').textContent = rawData.length - 1;
        
        const elevations = rawData.map(d => d.elev);
        document.getElementById('stat-elev-min').textContent = Math.min(...elevations).toFixed(1) + 'm';
        document.getElementById('stat-elev-max').textContent = Math.max(...elevations).toFixed(1) + 'm';

        // 初始化
        drawChart();
        showStationInfo(4300, 'K4+300', 278.74);
