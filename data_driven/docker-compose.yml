# =============================================================================
# NeuralSite Data-Driven Docker Compose
# =============================================================================

version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: data_driven/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://neuralsite:changeme@db:5432/neuralsite
      - REDIS_URL=redis://redis:6379/0
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - redis
    volumes:
      - ./data_driven:/app/data_driven
      - ../packages:/app/packages
      - uploads:/app/uploads

  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: neuralsite
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: neuralsite
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralsite"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  uploads:
