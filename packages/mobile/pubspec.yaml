name: neuralsite_mobile
description: NeuralSite Mobile - Construction Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  provider: ^6.0.5
  
  # Network
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Location & Maps
  geolocator: ^10.1.0
  latlong2: ^0.9.0
  
  # Image
  image_picker: ^1.0.4
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
